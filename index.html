let _password = sessionStorage.getItem("ch_pw") || "";

function setPassword(pw) { _password = pw; sessionStorage.setItem("ch_pw", pw); }

async function api(path, opts = {}) {
  const res = await fetch(API_URL + path, {
    ...opts,
    headers: { "Content-Type": "application/json", "x-password": _password, ...(opts.headers || {}) },
  });
  if (res.status === 401) throw new Error("unauthorized");
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// Map DB snake_case <-> JS camelCase for incidents
function incFromDB(r) {
  return { ...r, evidenceIds: r.evidence_ids || [], people_present: r.people_present || [],
    occurred_time: r.occurred_time || "", is_draft: r.is_draft || false, starred: r.starred || false };
}
function incToDB(r) {
  const o = { ...r };
  if ('evidenceIds' in o) { o.evidence_ids = o.evidenceIds; delete o.evidenceIds; }
  return o;
}
function witFromDB(r) {
  return { ...r, incidentIds: r.incident_ids || [] };
}
function witToDB(r) {
  const o = { ...r };
  if ('incidentIds' in o) { o.incident_ids = o.incidentIds; delete o.incidentIds; }
  return o;
}
function evFromDB(r) {
  return { ...r, incidentIds: r.incident_ids || [] };
}
function evToDB(r) {
  const o = { ...r };
  if ('incidentIds' in o) { o.incident_ids = o.incidentIds; delete o.incidentIds; }
  return o;
}

async function loadAllData() {
  const [incs, evs, wits] = await Promise.all([
    api("/incidents"), api("/evidence"), api("/witnesses")
  ]);
  return {
    incidents: incs.map(incFromDB).sort((a, b) => (a.occurred_on || "").localeCompare(b.occurred_on || "")),
    evidence: evs.map(evFromDB),
    witnesses: wits.map(witFromDB),
  };
}

/* ---------- Claude API (needs your own key when run outside claude.ai) ---------- */
async function askClaude(prompt, apiKey, maxTokens = 4000) {
  if (!apiKey) throw new Error("no-key");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, messages: [{ role: "user", content: prompt }] }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "api");
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
}
function parseJSON(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const start = Math.min(...["[", "{"].map(c => { const i = clean.indexOf(c); return i === -1 ? Infinity : i; }));
  try { return JSON.parse(clean.slice(start)); } catch { return null; }
}
/* ---------- v3: file drag-and-drop helpers ---------- */
function readAsText(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsText(file); }); }
function readAsDataURL(file) { return new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); }); }
function downscaleImage(dataUrl, maxDim = 1400, quality = 0.72) {
  return new Promise((res) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const c = document.createElement("canvas");
      c.width = Math.round(img.width * scale); c.height = Math.round(img.height * scale);
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => res(dataUrl);
    img.src = dataUrl;
  });
}
async function askClaudeVision(prompt, dataUrl, apiKey, maxTokens = 3000) {
  if (!apiKey) throw new Error("no-key");
  const b64 = dataUrl.split(",")[1];
  const media = (dataUrl.match(/^data:(.*?);/) || [])[1] || "image/jpeg";
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, messages: [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: media, data: b64 } }, { type: "text", text: prompt }] }] }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "api");
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
}

function DropZone({ onFiles, hint, busy, busyMsg, accept }) {
  const [over, setOver] = useState(false);
  const inputRef = useRef();
  const handle = (files) => { if (files && files.length && !busy) onFiles(Array.from(files)); };
  return (
    <div
      onDragOver={(e) => { e.preventDefault(); setOver(true); }}
      onDragLeave={() => setOver(false)}
      onDrop={(e) => { e.preventDefault(); setOver(false); handle(e.dataTransfer.files); }}
      onClick={() => !busy && inputRef.current.click()}
      style={{ border: "2px dashed " + (over ? T.gold : T.line), background: over ? "#FBF6E9" : busy ? "#F3F2EE" : "#FAFAF7", borderRadius: 4, padding: "18px 16px", textAlign: "center", cursor: busy ? "wait" : "pointer", marginBottom: 10 }}>
      <input ref={inputRef} type="file" multiple accept={accept || ".txt,.md,.csv,.log,image/*"} style={{ display: "none" }} onChange={(e) => { handle(e.target.files); e.target.value = ""; }} />
      <div style={{ fontSize: 13, fontWeight: busy ? 600 : 400 }}>{busy ? (busyMsg || "Working…") : hint}</div>
      {!busy && <div style={{ fontSize: 11.5, color: T.faint, marginTop: 3 }}>Drag files here, or click to choose — screenshots (.png / .jpg) and text files (.txt)</div>}

/* ---------- v4: duplicate detection ---------- */
const TRANSCRIBE_PROMPT = "Transcribe this screenshot completely and literally. Include sender names, timestamps, and every message verbatim. Preserve the order. Output plain text only — no commentary, no markdown.";
const STOP = new Set(["the","a","an","and","or","of","to","in","on","for","with","about","that","this","was","were","is","are","be","at","by","as","it","from","her","his","their","she","he","they","had","has","have","not"]);
function tokens(s) { return new Set((s || "").toLowerCase().replace(/[^a-z0-9\s]/g, " ").split(/\s+/).filter(w => w.length > 2 && !STOP.has(w))); }
function jaccard(a, b) { if (!a.size || !b.size) return 0; let inter = 0; a.forEach(t => { if (b.has(t)) inter++; }); return inter / (a.size + b.size - inter); }
function daysBetween(a, b) { return Math.abs(new Date(a) - new Date(b)) / 86400000; }
function isDupePair(x, y) {
  const tx = tokens((x.title || "") + " " + (x.description || ""));
  const ty = tokens((y.title || "") + " " + (y.description || ""));
  const close = (!x.occurred_on || !y.occurred_on) ? true : daysBetween(x.occurred_on, y.occurred_on) <= 3;
  const sim = jaccard(tx, ty);
  const sameTitle = (x.title || "").trim().toLowerCase() === (y.title || "").trim().toLowerCase() && (x.title || "").trim();
  return (close && sim >= 0.4) || sim >= 0.6 || !!sameTitle;
}
function findDupeClusters(incidents) {
  const n = incidents.length; const parent = [...Array(n).keys()];
  const find = (i) => parent[i] === i ? i : (parent[i] = find(parent[i]));
  for (let i = 0; i < n; i++) for (let j = i + 1; j < n; j++) if (isDupePair(incidents[i], incidents[j])) parent[find(j)] = find(i);
  const groups = {};
  incidents.forEach((inc, i) => { const r = find(i); (groups[r] = groups[r] || []).push(inc); });
  return Object.values(groups).filter(g => g.length > 1).map(g => [...g].sort((a, b) => (a.created_at || "").localeCompare(b.created_at || "")));
}

function monthsSince(startISO) {
  const out = []; const now = new Date();
  let d = new Date(startISO + "T00:00:00");
  while (d <= now) { out.push(new Date(d)); d = new Date(d.getFullYear(), d.getMonth() + 1, 1); }
  return out;
}

function PasswordGate({ children }) {
  const [state, setState] = useState("checking"); // checking, setup, login, ok
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");

  useEffect(() => {
    // Check if already has password in session
    if (_password) {
      api("/login", { method: "POST", body: JSON.stringify({ password: _password }) })
        .then(() => setState("ok"))
        .catch(() => { sessionStorage.removeItem("ch_pw"); _password = ""; setState("checking"); checkStatus(); });
      return;
    }
    checkStatus();
  }, []);

  function checkStatus() {
    fetch(API_URL + "/status").then(r => r.json()).then(d => {
      setState(d.needs_setup ? "setup" : "login");
    }).catch(() => setErr("Cannot reach server"));
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setErr("");
    if (state === "setup") {
      if (pw.length < 4) { setErr("Password must be at least 4 characters"); return; }
      try {
        await fetch(API_URL + "/setup", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: pw }) });
        setPassword(pw);
        setState("ok");
      } catch { setErr("Setup failed"); }
    } else {
      try {
        const res = await fetch(API_URL + "/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: pw }) });
        if (res.ok) { setPassword(pw); setState("ok"); }
        else setErr("Wrong password");
      } catch { setErr("Connection failed"); }
    }
  }

  if (state === "checking") return <div style={{ fontFamily: T.sans, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: T.paper }}><p style={{ color: T.faint }}>Connecting…</p></div>;
  if (state === "ok") return children;

  return (
    <div style={{ fontFamily: T.sans, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: T.paper }}>
      <form onSubmit={handleSubmit} style={{ background: "#fff", border: "1px solid " + T.line, borderRadius: 6, padding: "40px 36px", maxWidth: 340, width: "100%" }}>
        <h2 style={{ margin: "0 0 6px", fontSize: 20, fontFamily: T.serif }}>Case Hub</h2>
        <p style={{ margin: "0 0 20px", fontSize: 12, color: T.faint }}>{state === "setup" ? "Set a password to protect this record." : "Enter password to continue."}</p>
        <input type="password" placeholder="Password" value={pw} onChange={(e) => setPw(e.target.value)} style={{ marginBottom: 12 }} autoFocus />
        {err && <p style={{ fontSize: 12, color: T.accent, margin: "0 0 10px" }}>{err}</p>}
        <button type="submit" style={{ width: "100%", padding: "9px 0", fontSize: 13, fontWeight: 600, background: T.ink, color: T.paper, border: "none", borderRadius: 3 }}>{state === "setup" ? "Set password & enter" : "Enter"}</button>
      </form>
    </div>
  );
}

function CaseHub() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("timeline");
  const [incidents, setIncidents] = useState([]);
  const [evidence, setEvidence] = useState([]);
  const [witnesses, setWitnesses] = useState([]);
  const [retal, setRetal] = useState([]);
  const [analysis, setAnalysis] = useState(null);
  const [reportDate, setReportDate] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [lastBackup, setLastBackup] = useState("");
  const [intakeText, setIntakeText] = useState("");
  const [intakeDrafts, setIntakeDrafts] = useState(null);
  const [toast, setToast] = useState("");

  useEffect(() => {
    loadAllData().then(data => {
      setIncidents(data.incidents);
      setEvidence(data.evidence);
      setWitnesses(data.witnesses);
      setLoading(false);
    }).catch(e => { console.error("load failed", e); setLoading(false); });
  }, []);

  const notify = (m) => { setToast(m); setTimeout(() => setToast(""), 2600); };

  const addIncident = (inc) => {
    const row = { id: uid(), created_at: new Date().toISOString(), ...inc };
    setIncidents((p) => [...p, row].sort((a, b) => a.occurred_on.localeCompare(b.occurred_on)));
    api("/incidents", { method: "POST", body: JSON.stringify(incToDB(row)) }).catch(e => console.error("save incident", e));
    notify("Incident logged");
  };
  const updateIncident = (id, patch) => {
    setIncidents((p) => p.map((i) => (i.id === id ? { ...i, ...patch } : i)).sort((a, b) => (a.occurred_on || "").localeCompare(b.occurred_on || "")));
    api("/incidents/" + id, { method: "PATCH", body: JSON.stringify(incToDB(patch)) }).catch(e => console.error("update incident", e));
  };
  const deleteIncident = (id) => {
    setIncidents((p) => p.filter((i) => i.id !== id));
    setWitnesses((p) => p.map((w) => ({ ...w, incidentIds: (w.incidentIds || []).filter((x) => x !== id) })));
    api("/incidents/" + id, { method: "DELETE" }).catch(e => console.error("delete incident", e));
    notify("Incident deleted");
  };
  const deleteManyIncidents = (ids) => {
    const s = new Set(ids);
    setIncidents((p) => p.filter((i) => !s.has(i.id)));
    setWitnesses((p) => p.map((w) => ({ ...w, incidentIds: (w.incidentIds || []).filter((x) => !s.has(x)) })));
    ids.forEach(id => api("/incidents/" + id, { method: "DELETE" }).catch(e => console.error("delete", e)));
    notify(ids.length + " duplicate" + (ids.length === 1 ? "" : "s") + " deleted");
  };
  // Exhibit IDs: synchronous counter + filename registry so batch drops never collide or double-file
  const evRef = useRef({ counter: 0, byName: {} });
  useEffect(() => {
    evRef.current.counter = evidence.reduce((m, e) => Math.max(m, parseInt((e.exhibit_id || "").replace("A-", "")) || 0), 0);
    const map = {}; evidence.forEach((e) => { if (e.file_name) map[e.file_name] = e; });
    evRef.current.byName = map;
  }, [evidence]);
  const addEvidence = (ev) => {
    const dupe = ev.file_name && evRef.current.byName[ev.file_name];
    if (dupe) { notify(ev.file_name + " is already filed as " + dupe.exhibit_id + " — skipped"); return dupe; }
    evRef.current.counter += 1;
    const row = { id: uid(), exhibit_id: "A-" + evRef.current.counter, created_at: new Date().toISOString(), ...ev };
    if (row.file_name) evRef.current.byName[row.file_name] = row;
    setEvidence((p) => [...p, row]);
    api("/evidence", { method: "POST", body: JSON.stringify(evToDB(row)) }).catch(e => console.error("save evidence", e));
    notify("Filed as exhibit " + row.exhibit_id);
    return row;
  };
  const updateEvidence = (id, patch) => {
    setEvidence((p) => p.map((e) => (e.id === id ? { ...e, ...patch } : e)));
    api("/evidence/" + id, { method: "PATCH", body: JSON.stringify(evToDB(patch)) }).catch(e => console.error("update evidence", e));
  };
  const deleteEvidence = (id) => {
    setEvidence((p) => p.filter((e) => e.id !== id));
    setIncidents((p) => p.map((i) => ({ ...i, evidenceIds: (i.evidenceIds || []).filter((x) => x !== id) })));
    api("/evidence/" + id, { method: "DELETE" }).catch(e => console.error("delete evidence", e));
    notify("Exhibit removed (IDs of other exhibits don't change)");
  };
  const deleteManyEvidence = (ids) => {
    const s = new Set(ids);
    setEvidence((p) => p.filter((e) => !s.has(e.id)));
    setIncidents((p) => p.map((i) => ({ ...i, evidenceIds: (i.evidenceIds || []).filter((x) => !s.has(x)) })));
    ids.forEach(id => api("/evidence/" + id, { method: "DELETE" }).catch(e => console.error("delete", e)));
    notify(ids.length + " exhibit" + (ids.length === 1 ? "" : "s") + " removed");
  };
  const addWitness = (w) => {
    const row = { id: uid(), incidentIds: [], ...w };
    setWitnesses((p) => [...p, row]);
    api("/witnesses", { method: "POST", body: JSON.stringify(witToDB(row)) }).catch(e => console.error("save witness", e));
    notify("Person added");
  };
  const deleteWitness = (id) => {
    setWitnesses((p) => p.filter((w) => w.id !== id));
    api("/witnesses/" + id, { method: "DELETE" }).catch(e => console.error("delete witness", e));
    notify("Person removed");
  };
  const addRetal = (r) => { setRetal((p) => [...p, { id: uid(), ...r }]); notify("Logged to retaliation watch"); };
  const deleteRetal = (id) => { setRetal((p) => p.filter((r) => r.id !== id)); notify("Entry removed"); };
  const dupeClusters = useMemo(() => findDupeClusters(incidents), [incidents]);
  const dupeFlagged = dupeClusters.reduce((a, g) => a + g.length - 1, 0);

  const backup = () => {
    const blob = new Blob([JSON.stringify({ incidents, evidence, witnesses, retal, analysis, reportDate }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "case-hub-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    setLastBackup(new Date().toISOString().slice(0, 10));
  };
  const restoreRef = useRef();
  const restore = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        const incs = d.incidents || []; const evs = d.evidence || []; const wits = d.witnesses || [];
                setIncidents(incs); setEvidence(evs); setWitnesses(wits);
                // Sync restored data to backend (clear + re-insert)
                // For now just update local state — full sync on next session
        setRetal(d.retal || []); setAnalysis(d.analysis || null); setReportDate(d.reportDate || "");
        notify("Backup restored");
      } catch { notify("Couldn't read that backup file"); }
    };
    r.readAsText(f);
    e.target.value = "";
  };

  const nav = [
    ["Your case", [["timeline", "Timeline"], ["export", "Case file (print)"]]],
    ["Add to it", [["intake", "Add everything"], ["log", "Log one incident"], ["evidence", "Evidence vault"], ["witnesses", "Witnesses"], ["retaliation", "Retaliation watch"]]],
    ["Check it", [["dupes", "Duplicates"], ["audit", "Auditor"], ["analysis", "AI analysis"]]],
    ["Learn", [["legal", "Legal reference"]]],
    ["", [["settings", "Settings & backup"]]],
  ];
  const audit = useMemo(() => runAudit(incidents, evidence, witnesses), [incidents, evidence, witnesses]);

  if (loading) return (
    <div style={{ fontFamily: T.sans, display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: T.paper }}>
      <p style={{ color: T.faint, fontSize: 14 }}>Loading your case data…</p>
    </div>
  );

  return (
    <div style={{ fontFamily: T.sans, background: T.paper, color: T.ink, minHeight: "100vh", display: "flex" }}>
      <aside className="no-print" style={{ width: 208, borderRight: "1px solid " + T.line, padding: "22px 0", position: "sticky", top: 0, height: "100vh", boxSizing: "border-box", flexShrink: 0 }}>
        <div style={{ padding: "0 20px 18px", borderBottom: "1px solid " + T.line }}>
          <div style={{ fontFamily: T.serif, fontSize: 19 }}>Case Hub <span style={{ fontSize: 11, color: T.faint }}>v4</span></div>
          <div style={{ fontSize: 10.5, color: T.faint, marginTop: 3, letterSpacing: ".08em", textTransform: "uppercase" }}>Private record</div>
        </div>
        <nav style={{ padding: "6px 10px" }}>
          {nav.map(([section, items]) => (
            <div key={section || "misc"} style={{ marginBottom: 10 }}>
              {section && <div style={{ fontSize: 10, letterSpacing: ".1em", textTransform: "uppercase", color: T.faint, padding: "10px 12px 3px" }}>{section}</div>}
              {items.map(([k, label]) => (
                <button key={k} onClick={() => setTab(k)} style={{
                  display: "block", width: "100%", textAlign: "left", padding: "7px 12px", margin: "1px 0",
                  border: "none", borderRadius: 3, fontSize: 13,
                  background: tab === k ? T.ink : "transparent", color: tab === k ? T.paper : T.ink,
                }}>
                  {label}
                  {k === "audit" && audit.issues.length > 0 && (
                    <span style={{ float: "right", fontFamily: T.mono, fontSize: 11, color: tab === k ? T.paper : T.accent }}>{audit.issues.length}</span>
                  )}
                  {k === "dupes" && dupeFlagged > 0 && (
                    <span style={{ float: "right", fontFamily: T.mono, fontSize: 11, color: tab === k ? T.paper : T.gold }}>{dupeFlagged}</span>
                  )}
                  {k === "timeline" && incidents.length > 0 && (
                    <span style={{ float: "right", fontFamily: T.mono, fontSize: 11, color: tab === k ? T.paper : T.faint }}>{incidents.length}</span>
                  )}
                </button>
              ))}
            </div>
          ))}
        </nav>
        {(incidents.length > 0 || evidence.length > 0) && (!lastBackup || (Date.now() - new Date(lastBackup + "T00:00:00")) > 604800000) && (
          <div style={{ margin: "0 14px 10px", padding: "8px 10px", background: "#FBF6E9", border: "1px solid #E4D9BC", borderRadius: 3, fontSize: 11, lineHeight: 1.45 }}>
            Last backup: <strong>{lastBackup ? fmtDate(lastBackup) : "never"}</strong>.{" "}
            <button onClick={backup} style={{ border: "none", background: "none", padding: 0, textDecoration: "underline", fontSize: 11, cursor: "pointer" }}>Download one now</button>
          </div>
        )}
        <div style={{ padding: "14px 20px", fontSize: 11, color: T.faint, lineHeight: 1.5 }}>
          Saved automatically in this browser. Download backups regularly (Settings).
        </div>
      </aside>

      <main style={{ flex: 1, padding: "30px 38px", maxWidth: 980 }}>
        {tab === "timeline" && <Timeline incidents={incidents} witnesses={witnesses} evidence={evidence} onUpdate={updateIncident} onDelete={deleteIncident} onGoEvidence={(eid) => { setTab("evidence"); setTimeout(() => { const el = document.getElementById("ev-" + eid); if (el) { el.scrollIntoView({ behavior: "smooth", block: "center" }); el.style.outline = "2px solid " + T.gold; setTimeout(() => { el.style.outline = ""; }, 2400); } }, 120); }} />}
        {tab === "log" && <IncidentForm onSave={addIncident} evidence={evidence} />}
        {tab === "intake" && <BulkIntake apiKey={apiKey} goSettings={() => setTab("settings")} onDrafts={(ds) => ds.forEach(addIncident)} incidents={incidents} evidence={evidence} onAddEvidence={addEvidence} onPatchEvidence={updateEvidence} text={intakeText} setText={setIntakeText} drafts={intakeDrafts} setDrafts={setIntakeDrafts} />}
        {tab === "dupes" && <Duplicates clusters={dupeClusters} onDeleteMany={deleteManyIncidents} />}
        {tab === "evidence" && <EvidenceVault evidence={evidence} incidents={incidents} onAdd={addEvidence} onDelete={deleteEvidence} onDeleteMany={deleteManyEvidence} onPatch={updateEvidence} apiKey={apiKey} notify={notify} />}
        {tab === "witnesses" && <Witnesses witnesses={witnesses} incidents={incidents} onAdd={addWitness} onDelete={deleteWitness} onUpdate={(id, patch) => { setWitnesses(p => p.map(w => w.id === id ? { ...w, ...patch } : w)); api("/witnesses/" + id, { method: "PATCH", body: JSON.stringify(witToDB(patch)) }).catch(e => console.error("update witness", e)); }} />}
        {tab === "retaliation" && <Retaliation retal={retal} onAdd={addRetal} onDelete={deleteRetal} reportDate={reportDate} setReportDate={setReportDate} />}
        {tab === "legal" && <LegalReference />}
        {tab === "analysis" && <Analysis incidents={incidents} witnesses={witnesses} evidence={evidence} analysis={analysis} setAnalysis={setAnalysis} apiKey={apiKey} goSettings={() => setTab("settings")} />}
        {tab === "audit" && <Auditor audit={audit} incidents={incidents} goFix={() => setTab("timeline")} />}
        {tab === "export" && <CaseFile incidents={incidents} evidence={evidence} witnesses={witnesses} retal={retal} analysis={analysis} audit={audit} />}
        {tab === "settings" && (
          <div>
            <H sub="Your data lives only in this browser on this computer. Back it up like it matters — because it does.">Settings</H>
            <Panel>
              <label>Anthropic API key (for Add everything, transcription + AI analysis)</label>
              <input type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-…" />
              <p style={{ fontSize: 12, color: T.faint, lineHeight: 1.5 }}>Create one at console.anthropic.com → API keys. Stored only in this browser. Everything else in the app works without it.</p>
            </Panel>
            <Panel>
              <div style={{ display: "flex", gap: 10 }}>
                <Btn primary onClick={backup}>Download backup (.json)</Btn>
                <input ref={restoreRef} type="file" accept=".json" style={{ display: "none" }} onChange={restore} />
                <Btn onClick={() => restoreRef.current.click()}>Restore from backup</Btn>
              </div>
              <p style={{ fontSize: 12.5, margin: "10px 0 6px" }}>Last backup: <strong>{lastBackup ? fmtDate(lastBackup) : "never"}</strong>. Backups now include your stored screenshot images and transcriptions.</p>
              <p style={{ fontSize: 12, color: T.faint, lineHeight: 1.5, marginBottom: 0 }}>Browser storage can be wiped by clearing site data. Download a backup after every serious session and keep it somewhere safe (personal cloud drive, not company anything).</p>
            </Panel>
            <Panel>
              {(() => {
                let used = 0; try { for (let i = 0; i < localStorage.length; i++) { const k = localStorage.key(i); used += (localStorage.getItem(k) || "").length; } } catch (e) {}
                const pct = Math.min(100, (used / 5242880) * 100);
                return (<React.Fragment>
                  <div style={{ fontSize: 13, display: "flex", justifyContent: "space-between" }}>
                    <span>Browser storage used</span><span style={{ fontFamily: T.mono }}>{(used / 1048576).toFixed(2)} MB of ~5 MB</span>
                  </div>
                  <div style={{ height: 6, background: "#EEECE6", borderRadius: 99, marginTop: 8 }}><div style={{ height: 6, width: pct + "%", background: pct > 80 ? T.accent : T.green, borderRadius: 99 }} /></div>
                  <p style={{ fontSize: 12, color: T.faint, lineHeight: 1.5, marginBottom: 0 }}>Screenshots are compressed on intake to keep this small. If it ever fills, download a backup, then remove a few exhibits' stored images — the transcriptions and records stay.</p>
                </React.Fragment>);
              })()}
            </Panel>
          </div>
        )}
      </main>

      {toast && <div style={{ position: "fixed", bottom: 22, right: 22, background: T.ink, color: T.paper, padding: "9px 16px", borderRadius: 3, fontSize: 13, zIndex: 50 }}>{toast}</div>}
    </div>
  );
}

/* ---------- shared ---------- */
const H = ({ children, sub }) => (
  <header style={{ marginBottom: 22 }}>
    <h1 style={{ fontFamily: T.serif, fontSize: 26, fontWeight: 400, margin: 0 }}>{children}</h1>
    {sub && <p style={{ color: T.faint, fontSize: 13, margin: "6px 0 0", maxWidth: 620, lineHeight: 1.5 }}>{sub}</p>}
  </header>
);
const Panel = ({ children, style }) => (
  <section style={{ background: T.panel, border: "1px solid " + T.line, borderRadius: 4, padding: 20, marginBottom: 16, ...style }}>{children}</section>
);
const Btn = ({ children, onClick, primary, small, disabled }) => (
  <button onClick={onClick} disabled={disabled} style={{
    padding: small ? "6px 12px" : "9px 18px", fontSize: small ? 12 : 13, borderRadius: 3,
    border: "1px solid " + (primary ? T.ink : T.line),
    background: primary ? T.ink : "#fff", color: primary ? T.paper : T.ink, opacity: disabled ? 0.5 : 1,
  }}>{children}</button>
);
const Chip = ({ cat }) => {
  const c = CATEGORIES[cat] || CATEGORIES.other;
  return <span style={{ fontSize: 10.5, letterSpacing: ".04em", textTransform: "uppercase", color: "#fff", background: c.color, padding: "2px 8px", borderRadius: 2 }}>{c.label}</span>;
};

/* ---------- Timeline ---------- */
function Timeline({ incidents, witnesses, evidence, onUpdate, onDelete, onGoEvidence }) {
  const [catFilter, setCatFilter] = useState("");
  const [personFilter, setPersonFilter] = useState("");
  const [storyFilter, setStoryFilter] = useState("");
  const [editId, setEditId] = useState(null);
  const [viewExhibit, setViewExhibit] = useState(null);
  const [showContext, setShowContext] = useState(false);
  const [ctxOpen, setCtxOpen] = useState({});
  const [starredOnly, setStarredOnly] = useState(false);
  const linkBtn = { border: "none", background: "none", padding: 0, fontSize: 11.5, textDecoration: "underline", color: T.faint, cursor: "pointer" };
  const months = monthsSince("2025-07-01");
  const filtered = incidents.filter(i =>
    (!catFilter || i.category === catFilter) &&
    (!storyFilter || i.storyline === storyFilter) &&
    (!starredOnly || i.starred) &&
    (!personFilter || (i.people_present || []).join(" ").toLowerCase().includes(personFilter.toLowerCase()))
  );
  const starCount = incidents.filter(i => i.starred).length;
  const ctxCount = filtered.filter(i => i.relevance === "context").length;
  const byMonth = (m) => filtered.filter(i => {
    const d = new Date(i.occurred_on + "T00:00:00");
    return d.getFullYear() === m.getFullYear() && d.getMonth() === m.getMonth();
  });
  // Collapse runs of empty months into a single quiet divider
  const blocks = [];
  let quiet = [];
  months.forEach((m) => {
    const rows = byMonth(m);
    if (rows.length === 0) { quiet.push(m); }
    else {
      if (quiet.length) { blocks.push({ type: "quiet", months: quiet }); quiet = []; }
      blocks.push({ type: "month", m, rows });
    }
  });
  if (quiet.length) blocks.push({ type: "quiet", months: quiet });
  const monthLabel = (m) => m.toLocaleDateString("en-US", { month: "short", year: "numeric" });
  const needsReview = incidents.filter(i => i.is_draft).length;
  return (
    <div>
      <H sub="Every documented incident from July 2025 to today, in order. Corroboration marks show how many people can speak to each event.">Timeline</H>
      {viewExhibit && (
        <div onClick={() => setViewExhibit(null)} style={{ position: "fixed", inset: 0, background: "rgba(20,20,20,.75)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 30, cursor: "zoom-out" }}>
          <div style={{ maxWidth: "90%", maxHeight: "90%", overflow: "auto", background: "#fff", borderRadius: 6, padding: 20, cursor: "default" }} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, gap: 12 }}>
              <strong style={{ fontFamily: T.mono, fontSize: 14 }}>{viewExhibit.exhibit_id}</strong>
              <span style={{ fontSize: 13, flex: 1 }}>{viewExhibit.label || viewExhibit.file_name}</span>
              {viewExhibit.dated && <span style={{ fontFamily: T.mono, fontSize: 11.5, color: T.faint }}>{fmtDate(viewExhibit.dated)}</span>}
              <Btn small onClick={() => setViewExhibit(null)}>Close</Btn>
            </div>
            {viewExhibit.notes && <p style={{ fontSize: 12, color: T.faint, margin: "0 0 10px" }}>{viewExhibit.notes}</p>}
            {viewExhibit.image_data && <img src={viewExhibit.image_data} style={{ maxWidth: "100%", display: "block", border: "1px solid " + T.line, borderRadius: 3 }} />}
            {!viewExhibit.image_data && !viewExhibit.transcription && <p style={{ fontSize: 13, color: T.faint, margin: "20px 0" }}>No image or transcription stored for this exhibit. It may reference a Slack permalink or external document.</p>}
            {viewExhibit.transcription && (<div style={{ marginTop: 12 }}>
              <label>Transcription</label>
              <pre style={{ fontSize: 12, whiteSpace: "pre-wrap", fontFamily: T.mono, background: "#FAFAF7", border: "1px solid " + T.line, borderRadius: 3, padding: 12, maxHeight: 300, overflow: "auto" }}>{viewExhibit.transcription}</pre>
            </div>)}
          </div>
        </div>
      )}
      {needsReview > 0 && (
        <Panel style={{ borderLeft: "3px solid " + T.gold, padding: "12px 16px" }}>
          <p style={{ margin: 0, fontSize: 13 }}><strong>{needsReview}</strong> item{needsReview === 1 ? "" : "s"} below {needsReview === 1 ? "is" : "are"} waiting for you to double-check the date and hit <strong>Confirm</strong>. Everything else is done.</p>
        </Panel>
      )}
      <div className="no-print" style={{ display: "flex", gap: 10, marginBottom: 10, maxWidth: 760, flexWrap: "wrap" }}>
        <select style={{ width: "auto", flex: 1, minWidth: 160 }} value={storyFilter} onChange={(e) => setStoryFilter(e.target.value)}>
          <option value="">All situations</option>
          {Object.entries(STORYLINES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <select style={{ width: "auto", flex: 1, minWidth: 160 }} value={catFilter} onChange={(e) => setCatFilter(e.target.value)}>
          <option value="">All categories</option>
          {Object.entries(CATEGORIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <input style={{ width: "auto", flex: 1, minWidth: 160 }} placeholder="Filter by person present…" value={personFilter} onChange={(e) => setPersonFilter(e.target.value)} />
        <button onClick={() => setStarredOnly(s => !s)} style={{ fontSize: 12, padding: "5px 13px", borderRadius: 3, border: "1px solid " + (starredOnly ? "#D4A017" : T.line), background: starredOnly ? "#FFF8E1" : "#fff", color: starredOnly ? "#D4A017" : T.faint, cursor: "pointer", whiteSpace: "nowrap" }}>
          {starredOnly ? "★ Starred (" + starCount + ")" : "☆ Starred" + (starCount ? " (" + starCount + ")" : "")}
        </button>
      </div>
      <div className="no-print" style={{ marginBottom: 16 }}>
        <button onClick={() => { setShowContext(s => !s); setCtxOpen({}); }} style={{ fontSize: 12, padding: "5px 13px", borderRadius: 3, border: "1px dashed " + T.line, background: showContext ? "#EFEDE8" : "#fff", color: T.faint }}>
          {showContext ? "▾ Collapse background items" : "▸ Expand background items (" + ctxCount + ")"}
        </button>
        <span style={{ fontSize: 11.5, color: T.faint, marginLeft: 10 }}>Background items are relevant context, not core evidence — collapsed to one line unless expanded.</span>
      </div>
      {incidents.length === 0 && <Panel><p style={{ margin: 0, color: T.faint, fontSize: 13 }}>Nothing here yet. Go to <strong>Add everything</strong> to drop in your files and notes at once, or <strong>Log one incident</strong> to add a single event.</p></Panel>}
      <div style={{ position: "relative", paddingLeft: 26 }}>
        <div style={{ position: "absolute", left: 8, top: 0, bottom: 0, width: 1, background: T.line }} />
        {blocks.map((b, bi) => {
          if (b.type === "quiet") {
            const label = b.months.length === 1 ? monthLabel(b.months[0]) : monthLabel(b.months[0]) + " – " + monthLabel(b.months[b.months.length - 1]);
            return (
              <div key={"q" + bi} style={{ fontFamily: T.mono, fontSize: 10.5, color: T.faint, letterSpacing: ".06em", margin: "12px 0", position: "relative" }}>
                <span style={{ position: "absolute", left: -21, top: 3, width: 5, height: 5, borderRadius: 99, background: T.line }} />
                {label.toUpperCase()} — no entries
              </div>
            );
          }
          return (
            <div key={b.m.toISOString()} style={{ marginBottom: 10 }}>
              <div style={{ fontFamily: T.mono, fontSize: 11, color: T.ink, letterSpacing: ".06em", margin: "14px 0 6px", position: "relative" }}>
                <span style={{ position: "absolute", left: -22, top: 4, width: 7, height: 7, borderRadius: 99, background: T.ink }} />
                {b.m.toLocaleDateString("en-US", { month: "long", year: "numeric" }).toUpperCase()}
                <span style={{ color: T.faint }}>  ·  {b.rows.length}</span>
              </div>
              {b.rows.map((i) => {
                const wits = witnesses.filter(w => (w.incidentIds || []).includes(i.id));
                const exs = (i.evidenceIds || []).map(id => evidence.find(e => e.id === id)).filter(Boolean);
                const editing = editId === i.id;
                const story = STORYLINES[i.storyline];
                const isCtxOpen = ctxOpen[i.id] !== undefined ? ctxOpen[i.id] : showContext;
                if (i.relevance === "context" && !isCtxOpen && !editing) {
                  return (
                    <div key={i.id} onClick={() => setCtxOpen(p => ({ ...p, [i.id]: true }))} title="Click to expand"
                      style={{ display: "flex", gap: 8, alignItems: "center", padding: "5px 12px", marginBottom: 5, background: "#F1EFEA", border: "1px dashed " + T.line, borderRadius: 3, fontSize: 12, color: T.faint, cursor: "pointer" }}>
                      <span>▸</span>
                      {i.starred && <span style={{ color: "#D4A017", fontSize: 13, flexShrink: 0 }}>★</span>}
                      <span style={{ fontFamily: T.mono, fontSize: 10.5, flexShrink: 0 }}>{fmtDate(i.occurred_on)}</span>
                      {story && <span style={{ width: 7, height: 7, borderRadius: 99, background: story.color, flexShrink: 0 }} title={story.label} />}
                      <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{i.title}</span>
                      <span style={{ marginLeft: "auto", fontSize: 10, letterSpacing: ".05em", textTransform: "uppercase", flexShrink: 0 }}>background</span>
                    </div>
                  );
                }
                return (
                  <article key={i.id} style={{ background: T.panel, border: "1px solid " + T.line, borderLeft: "3px solid " + (CATEGORIES[i.category] || CATEGORIES.other).color, borderRadius: 3, padding: "13px 16px", marginBottom: 8 }}>
                    {!editing && (<React.Fragment>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                      <span style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                        <button onClick={() => onUpdate(i.id, { starred: !i.starred })} title={i.starred ? "Unstar" : "Star this item"} style={{ border: "none", background: "none", padding: 0, cursor: "pointer", fontSize: 16, lineHeight: 1, color: i.starred ? "#D4A017" : "#CCC" }}>{i.starred ? "★" : "☆"}</button>
                        <strong style={{ fontSize: 14 }}>{i.title}</strong>
                      </span>
                      <span style={{ fontFamily: T.mono, fontSize: 11.5, color: T.faint }}>{fmtDate(i.occurred_on)}{i.occurred_time ? " · " + i.occurred_time : ""}</span>
                    </div>
                    <div style={{ fontSize: 13, lineHeight: 1.55, margin: "7px 0", whiteSpace: "pre-wrap" }}>{i.description}</div>
                    {i.quotes && <p style={{ fontSize: 12.5, fontFamily: T.serif, fontStyle: "italic", margin: "4px 0", color: "#444" }}>"{i.quotes}"</p>}
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginTop: 6 }}>
                      {story && <span style={{ fontSize: 10.5, letterSpacing: ".04em", textTransform: "uppercase", color: story.color, border: "1px solid " + story.color, padding: "1px 7px", borderRadius: 2, background: "#fff", fontWeight: 600 }}>{story.label}</span>}
                      <Chip cat={i.category} />
                      {i.relevance === "context" && <span onClick={() => setCtxOpen(p => ({ ...p, [i.id]: false }))} title="Collapse" style={{ fontSize: 10, letterSpacing: ".05em", textTransform: "uppercase", color: T.faint, border: "1px dashed " + T.line, padding: "1px 7px", borderRadius: 2, cursor: "pointer" }}>background ▴</span>}
                      {i.medium && <span style={{ fontSize: 11, color: T.faint }}>{i.medium.replace("_", " ")}</span>}
                      {(i.people_present || []).length > 0 && <span style={{ fontSize: 11, color: T.faint }}>present: {(i.people_present || []).join(", ")}</span>}
                      {exs.map(e => <button key={e.id} title={e.label || e.exhibit_id} onClick={() => setViewExhibit(e)} style={{ fontFamily: T.mono, fontSize: 10.5, border: "1px solid " + T.line, padding: "1px 6px", borderRadius: 2, background: "#FAFAF7", cursor: "pointer" }}>{e.exhibit_id}</button>)}
                      {wits.length > 0 && <span title="corroborating people" style={{ fontSize: 11, color: T.green }}>{"●".repeat(Math.min(wits.length, 5))} {wits.length} corroborating</span>}
                      <span className="no-print" style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
                        <button onClick={() => setEditId(i.id)} style={{ fontSize: 11.5, padding: "3px 11px", borderRadius: 3, border: "1px solid " + T.line, background: "#fff", color: T.ink }}>Edit</button>
                        <button onClick={() => { if (window.confirm('Delete "' + i.title + '" from the timeline? This can\'t be undone (outside of backups).')) onDelete(i.id); }} style={{ fontSize: 11.5, padding: "3px 11px", borderRadius: 3, border: "1px solid " + T.accent, background: "#fff", color: T.accent }}>Delete</button>
                      </span>
                    </div>
                    </React.Fragment>)}
                    {editing && (<div className="no-print">
                      <label>Title</label><input value={i.title} onChange={(e) => onUpdate(i.id, { title: e.target.value })} />
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
                        <div><label>Date</label><input type="date" value={i.occurred_on || ""} onChange={(e) => onUpdate(i.id, { occurred_on: e.target.value })} /></div>
                        <div><label>Approx. time</label><input value={i.occurred_time || ""} onChange={(e) => onUpdate(i.id, { occurred_time: e.target.value })} /></div>
                        <div><label>Category</label><select value={i.category} onChange={(e) => onUpdate(i.id, { category: e.target.value })}>{Object.entries(CATEGORIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></div>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                        <div><label>Situation</label><select value={i.storyline || "baseline"} onChange={(e) => onUpdate(i.id, { storyline: e.target.value })}>{Object.entries(STORYLINES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></div>
                        <div><label>Weight</label><select value={i.relevance || "core"} onChange={(e) => onUpdate(i.id, { relevance: e.target.value })}><option value="core">Core evidence</option><option value="context">Background (collapses)</option></select></div>
                      </div>
                      <label>What happened</label><textarea value={i.description} onChange={(e) => onUpdate(i.id, { description: e.target.value })} />
                      <label>Exact quotes</label><textarea style={{ minHeight: 50 }} value={i.quotes || ""} onChange={(e) => onUpdate(i.id, { quotes: e.target.value })} />
                      <label>People present (comma-separated)</label><input value={(i.people_present || []).join(", ")} onChange={(e) => onUpdate(i.id, { people_present: e.target.value.split(",").map(s => s.trim()).filter(Boolean) })} />
                      <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                        <Btn small primary onClick={() => setEditId(null)}>Done</Btn>
                        <span style={{ fontSize: 11.5, color: T.faint, alignSelf: "center" }}>Changes save as you type.</span>
                      </div>
                    </div>)}
                    {i.is_draft && !editing && (
                      <div className="no-print" style={{ marginTop: 10, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", background: "#FBF6E9", border: "1px solid #E4D9BC", padding: "7px 10px", borderRadius: 3 }}>
                        <span style={{ fontSize: 12, color: T.gold, fontWeight: 600 }}>Is this date right?</span>
                        <input type="date" style={{ width: 155 }} value={i.occurred_on || ""} onChange={(e) => onUpdate(i.id, { occurred_on: e.target.value })} />
                        <Btn small primary onClick={() => onUpdate(i.id, { is_draft: false })}>Yes — confirm</Btn>
                      </div>
                    )}
                  </article>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- Incident form ---------- */
function IncidentForm({ onSave, evidence }) {
  const empty = { occurred_on: "", occurred_time: "", title: "", description: "", quotes: "", medium: "slack", category: "undermining", people: "", impact: "", evidenceIds: [] };
  const [f, setF] = useState(empty);
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const emotional = EMOTIONAL_WORDS.filter(w => (f.description + " " + f.title).toLowerCase().includes(w));
  return (
    <div>
      <H sub="Specific, factual, dated. Exact quotes beat characterizations. Write it like the person reading it has never met anyone involved.">Log an incident</H>
      <Panel>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
          <div><label>Date</label><input type="date" min="2025-07-01" value={f.occurred_on} onChange={set("occurred_on")} /></div>
          <div><label>Approx. time</label><input placeholder="2:30 PM" value={f.occurred_time} onChange={set("occurred_time")} /></div>
          <div><label>Medium</label><select value={f.medium} onChange={set("medium")}>{MEDIUMS.map(m => <option key={m} value={m}>{m.replace("_", " ")}</option>)}</select></div>
        </div>
        <label>Short title</label><input placeholder="e.g., Escalation citing 'team confusion'" value={f.title} onChange={set("title")} />
        <label>What happened — facts only</label><textarea value={f.description} onChange={set("description")} placeholder="Who did what, in what order. No interpretation." />
        {emotional.length > 0 && <p style={{ fontSize: 12, color: T.gold, margin: "6px 0 0" }}>Consider neutralizing: "{emotional.join('", "')}" — describe the behavior instead of characterizing it.</p>}
        <label>Exact quotes (if any)</label><textarea style={{ minHeight: 50 }} value={f.quotes} onChange={set("quotes")} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <div><label>Category</label><select value={f.category} onChange={set("category")}>{Object.entries(CATEGORIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></div>
          <div><label>People present (comma-separated)</label><input value={f.people} onChange={set("people")} /></div>
        </div>
        <label>Impact on you / your work</label><textarea style={{ minHeight: 50 }} value={f.impact} onChange={set("impact")} />
        <label>Attach evidence (exhibit IDs)</label>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {evidence.length === 0 && <span style={{ fontSize: 12, color: T.faint }}>Nothing in the vault yet — add files under Evidence vault, then link them here.</span>}
          {evidence.map(e => {
            const on = f.evidenceIds.includes(e.id);
            return <button key={e.id} onClick={() => setF({ ...f, evidenceIds: on ? f.evidenceIds.filter(x => x !== e.id) : [...f.evidenceIds, e.id] })}
              style={{ fontFamily: T.mono, fontSize: 11, padding: "3px 8px", borderRadius: 2, border: "1px solid " + (on ? T.ink : T.line), background: on ? T.ink : "#fff", color: on ? "#fff" : T.ink }}>{e.exhibit_id}</button>;
          })}

        <div style={{ marginTop: 18 }}>
          <Btn primary disabled={!f.occurred_on || !f.title || !f.description} onClick={() => {
            onSave({ occurred_on: f.occurred_on, occurred_time: f.occurred_time, title: f.title, description: f.description, quotes: f.quotes, medium: f.medium, category: f.category, people_present: f.people.split(",").map(s => s.trim()).filter(Boolean), impact: f.impact, evidenceIds: f.evidenceIds, is_draft: false });
            setF(empty);

/* ---------- Add everything (unified intake) ---------- */
function BulkIntake({ onDrafts, apiKey, goSettings, incidents, evidence, onAddEvidence, onPatchEvidence, text, setText, drafts, setDrafts }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [addedCount, setAddedCount] = useState(0);
  const [fileBusy, setFileBusy] = useState("");
  const [filedNote, setFiledNote] = useState("");
  const textRef = useRef("");
  useEffect(() => { textRef.current = text; }, [text]);
  // Exhibits already in the vault that can feed the sorter directly
  const vaultUsable = (evidence || []).filter(e => (e.transcription || "").trim() || e.image_data);
  const vaultPending = vaultUsable.filter(e => !(e.transcription || "").trim());
  const sortFromVault = async () => {
    setErr("");
    let material = "";
    try {
      for (let n = 0; n < vaultUsable.length; n++) {
        const e = vaultUsable[n];
        let t = (e.transcription || "").trim();
        if (!t) {
          if (!apiKey) { setErr("needs-key"); setFileBusy(""); return; }
          setFileBusy("Transcribing " + (e.file_name || e.exhibit_id) + " (" + (n + 1) + " of " + vaultUsable.length + ")… keep this screen open");
          t = await askClaudeVision(TRANSCRIBE_PROMPT, e.image_data, apiKey);
          onPatchEvidence(e.id, { transcription: t });
        }
        material += "\n\n--- SOURCE [" + e.exhibit_id + ": " + (e.file_name || "") + "] ---\n" + t;
      }
    } catch (ex) {
      setFileBusy("");
      setErr(ex.message === "no-key" ? "needs-key" : "Couldn't transcribe from the vault — " + ex.message);
      return;
    }
    setFileBusy("");
    material = material.replace(/^\n+/, "");
    if (material) { setText(material); run(material); }
  };
  const onFiles = async (files) => {
    setErr("");
    let added = ""; let filed = 0; let problem = false;
    for (let n = 0; n < files.length; n++) {
      const f = files[n];
      try {
        if (isTextFile(f)) {
          setFileBusy("Reading " + f.name + "…");
          const t = await readAsText(f);
          added += "\n\n--- SOURCE [text file: " + f.name + "] ---\n" + t;
        } else if (isImage(f)) {
          if (!apiKey) { setErr("needs-key"); problem = true; continue; }
          setFileBusy("Filing " + f.name + " (" + (n + 1) + " of " + files.length + ")…");
          const raw = await readAsDataURL(f);
          const small = await downscaleImage(raw);
          const row = onAddEvidence({ source: "slack_screenshot", evidence_date: "", label: f.name, notes: "added via Add everything", file_name: f.name, image_data: small, transcription: "" });
          if (row.transcription) {
            // already filed & transcribed previously — reuse, no API cost
            added += "\n\n--- SOURCE [" + row.exhibit_id + ": " + f.name + "] ---\n" + row.transcription;
            continue;
          }
          filed++;
          setFileBusy("Transcribing " + f.name + " (" + (n + 1) + " of " + files.length + ")… keep this screen open");
          const t = await askClaudeVision(TRANSCRIBE_PROMPT, small, apiKey);
          onPatchEvidence(row.id, { transcription: t });
          added += "\n\n--- SOURCE [" + row.exhibit_id + ": " + f.name + "] ---\n" + t;
        } else {
          setErr("Skipped " + f.name + " — only text files and images are supported here."); problem = true;
        }
      } catch (e) {
        problem = true;
        setErr(e.message === "no-key" ? "needs-key" : "Couldn't process " + f.name + " — " + e.message);
      }
    }
    let merged = textRef.current;
    if (added) { merged = merged ? merged + added : added.replace(/^\n+/, ""); setText(merged); }
    if (filed) setFiledNote(filed + " screenshot" + (filed === 1 ? "" : "s") + " filed in the Evidence vault with exhibit IDs" + (!problem && merged.trim() ? " — sorting into incidents now, hang tight…" : "."));
    setFileBusy("");
    if (!problem && added && merged.trim()) run(merged); // auto-sort: no extra click needed
  };
  const Step = ({ n, children }) => (
    <div style={{ display: "flex", gap: 10, alignItems: "baseline", marginBottom: 8 }}>
      <span style={{ fontFamily: T.mono, fontSize: 12, background: T.ink, color: T.paper, borderRadius: 99, width: 20, height: 20, display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{n}</span>
      <strong style={{ fontSize: 14 }}>{children}</strong>
    </div>
  );
  const run = async (material) => {
    setBusy(true); setErr(""); setAddedCount(0);
    try {
      const out = await askClaude(
        "You are helping organize workplace-incident documentation. Below is a raw dump of notes, transcripts, and descriptions. Split it into discrete incidents. IGNORE any to-do lists, task lists, instructions, or 'still needed' sections — only extract events that actually happened. The material may contain delimiters like \"--- SOURCE [A-3: filename] ---\" marking which file each block came from; use them only for attribution. Respond ONLY with a JSON array, no markdown, where each item is: {\"occurred_on\":\"YYYY-MM-DD (best estimate; if unknown use null)\",\"title\":\"short factual title\",\"description\":\"neutral factual summary in third person, no emotional language\",\"quotes\":\"any exact quotes found, else empty string\",\"medium\":\"slack|zoom|email|in_person|social|text|other\",\"category\":\"undermining|exclusion|misrepresentation|retaliation|discrimination|witness_reported|other\",\"people_present\":[\"names mentioned as present\"],\"sources\":[\"exhibit codes like A-3 from the SOURCE delimiters this incident's material came from, else empty array\"]}. Only include events that actually appear in the text. RAW DUMP:\n\n" + material, apiKey, 6000);
      const arr = parseJSON(out);
      if (!Array.isArray(arr)) throw new Error("parse");
      setDrafts(arr.map(d => {
        const m = (incidents || []).find(x => isDupePair(x, d));
        return { ...d, _include: !m, _dupeOf: m ? m.title + " (" + fmtDate(m.occurred_on) + ")" : null };
      }));
    } catch (e) {
      setErr(e.message === "no-key" ? "needs-key" : "Couldn't sort that batch — try a smaller chunk or cleaner text.");
    }
    setBusy(false);
  };
  const setDraft = (idx, patch) => setDrafts(ds => ds.map((d, i) => i === idx ? { ...d, ...patch } : d));
  const keeping = drafts ? drafts.filter(d => d._include) : [];
  const addAll = () => {
    onDrafts(keeping.map(d => ({
      occurred_on: d.occurred_on || "", occurred_time: "", title: d.title, description: d.description,
      quotes: d.quotes || "", medium: d.medium || "other", category: d.category || "other",
      people_present: d.people_present || [], impact: "",
      evidenceIds: (d.sources || []).map(code => (evidence || []).find(e => e.exhibit_id === code)?.id).filter(Boolean),
      is_draft: !d.occurred_on, // only flags items still missing a date
    })));
    setAddedCount(keeping.length); setDrafts(null); setText(""); setFiledNote("");
  };
  return (
    <div>
      <H sub="The one door for everything. Drop screenshots and text files, or paste text — screenshots get filed as exhibits and transcribed automatically, then it all sorts into dated incidents that stay linked to their evidence. Anything that looks like something already on your timeline gets flagged, not duplicated.">Add everything</H>
      {addedCount > 0 && (
        <Panel style={{ borderLeft: "3px solid " + T.green, padding: "14px 18px" }}>
          <p style={{ margin: 0, fontSize: 13.5 }}><strong>{addedCount} incident{addedCount === 1 ? "" : "s"} added to your timeline.</strong> They're live — head to the Timeline tab to see them. Anything that was missing a date has a yellow "Is this date right?" box waiting for you there.</p>
        </Panel>
      )}
      {!drafts && (
        <React.Fragment>
        {vaultUsable.length > 0 && !fileBusy && !busy && (
          <Panel style={{ borderLeft: "4px solid " + T.gold, background: "#FFFDF4" }}>
            <p style={{ margin: 0, fontSize: 13.5 }}><strong>{vaultUsable.length} exhibit{vaultUsable.length === 1 ? " is" : "s are"} filed in your Evidence vault{vaultPending.length > 0 ? " (" + vaultPending.length + " still need" + (vaultPending.length === 1 ? "s" : "") + " transcription)" : ""}.</strong> Anything among them that never made it onto your timeline can be sorted straight from the vault — no re-dropping files.</p>
            <div style={{ marginTop: 10 }}><Btn primary onClick={sortFromVault}>Sort {vaultUsable.length} filed exhibit{vaultUsable.length === 1 ? "" : "s"} into incidents</Btn></div>
          </Panel>
        )}
        <Panel>
          <Step n="1">Drop files or paste text</Step>
          <p style={{ fontSize: 12.5, color: T.faint, margin: "0 0 10px 30px" }}>Screenshots are filed in the Evidence vault with exhibit IDs and transcribed word-for-word into the box below (needs your API key). .txt files load in as-is. Re-dropping a file you already filed is fine — it's skipped, not double-filed.</p>
          <DropZone onFiles={onFiles} busy={!!fileBusy} busyMsg={fileBusy} hint="Drop screenshots or .txt files here" />
          {filedNote && <p style={{ fontSize: 12.5, color: T.green, margin: "0 0 8px", fontWeight: 600 }}>{filedNote}</p>}
          {busy && <p style={{ fontSize: 13, color: T.gold, margin: "0 0 8px", fontWeight: 600 }}>Sorting into incidents… takes 10–30 seconds. The review list will appear right here.</p>}
          <textarea style={{ minHeight: 220, fontFamily: T.mono, fontSize: 12.5 }} value={text} onChange={(e) => setText(e.target.value)} placeholder={"July 12 — message to leadership citing 'confusion within the team' about…\n\n[paste transcript excerpts, notes, anything — or drop files above]"} />
          <div style={{ marginTop: 12 }}><Btn primary disabled={!text.trim() || busy} onClick={() => run(text)}>{busy ? "Sorting… (10–30 seconds)" : "Sort it"}</Btn></div>
          {err === "needs-key" && <p style={{ fontSize: 13, color: T.gold }}>This feature needs your Anthropic API key. <button onClick={goSettings} style={{ border: "none", background: "none", textDecoration: "underline", fontSize: 13, padding: 0, cursor: "pointer" }}>Add it in Settings</button> — takes two minutes.</p>}
          {err && err !== "needs-key" && (
            <div style={{ border: "1px solid " + T.accent, borderLeft: "4px solid " + T.accent, background: "#FBEFEF", borderRadius: 3, padding: "10px 14px", marginTop: 10 }}>
              <p style={{ margin: 0, fontSize: 13, color: T.accent, fontWeight: 600 }}>Something failed: {err}</p>
              {/credit|billing|balance|payment/i.test(err) && <p style={{ margin: "5px 0 0", fontSize: 12.5, lineHeight: 1.5 }}>This means your API account needs billing credit. Add a few dollars at console.anthropic.com → Billing, then re-drop the same files — anything already filed is skipped, not duplicated.</p>}
              {!/credit|billing|balance|payment/i.test(err) && <p style={{ margin: "5px 0 0", fontSize: 12.5, lineHeight: 1.5 }}>Re-drop the same files to retry — anything already filed and transcribed is reused, not duplicated or re-billed.</p>}
            </div>
          )}
        </Panel>
        </React.Fragment>
      )}
      {drafts && (
        <React.Fragment>
          <Panel>
            <Step n="2">Glance over what I found — duplicates come unchecked, fix any dates</Step>
            {drafts.map((d, i) => (
              <div key={i} style={{ borderTop: "1px solid " + T.line, padding: "12px 0", fontSize: 13, opacity: d._include ? 1 : 0.45 }}>
                <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                  <input type="checkbox" style={{ width: "auto", marginTop: 3 }} checked={d._include} onChange={(e) => setDraft(i, { _include: e.target.checked })} />
                  <div style={{ flex: 1 }}>
                    <strong>{d.title}</strong>
                    {(d.sources || []).length > 0 && <span style={{ fontFamily: T.mono, fontSize: 10.5, border: "1px solid " + T.line, padding: "1px 6px", borderRadius: 2, marginLeft: 8 }}>{d.sources.join(", ")}</span>}
                    <p style={{ margin: "5px 0", lineHeight: 1.5 }}>{d.description}</p>
                    {d._dupeOf && <p style={{ fontSize: 12, color: T.gold, margin: "0 0 6px", fontWeight: 600 }}>Looks like a duplicate of "{d._dupeOf}" already on your timeline — left unchecked. Tick it only if it's genuinely a different event.</p>}
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <input type="date" style={{ width: 150 }} value={d.occurred_on || ""} onChange={(e) => setDraft(i, { occurred_on: e.target.value })} />
                      {!d.occurred_on && <span style={{ fontSize: 11.5, color: T.accent }}>← needs a date (or add it later on the timeline)</span>}
                      <select style={{ width: "auto" }} value={d.category || "other"} onChange={(e) => setDraft(i, { category: e.target.value })}>
                        {Object.entries(CATEGORIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </Panel>
          <Panel style={{ borderLeft: "4px solid " + T.green }}>
            <Step n="3">Put them on your timeline</Step>
            <p style={{ fontSize: 12.5, color: T.faint, margin: "0 0 10px 30px" }}><strong style={{ color: T.ink }}>Nothing lands on your timeline until you click this button.</strong> Checked items go on; unchecked ones are dropped.</p>
            <div style={{ display: "flex", gap: 8, marginLeft: 30 }}>
              <Btn primary disabled={keeping.length === 0} onClick={addAll}>Add {keeping.length} to timeline</Btn>
              <Btn onClick={() => setDrafts(null)}>Start over</Btn>
            </div>
          </Panel>
        </React.Fragment>
      )}
    </div>
  );
}

/* ---------- Duplicates review ---------- */
function Duplicates({ clusters, onDeleteMany }) {
  const clusterKey = clusters.map(g => g.map(x => x.id).join(",")).join("|");
  const [sel, setSel] = useState({});
  useEffect(() => {
    const s = {};
    clusters.forEach(g => g.forEach((inc, idx) => { if (idx > 0) s[inc.id] = true; }));
    setSel(s);
  }, [clusterKey]);
  const checked = Object.keys(sel).filter(id => sel[id]);
  return (
    <div>
      <H sub="Entries that look like the same event logged twice — close dates, overlapping wording. The oldest-logged copy in each group is kept by default and the rest come pre-checked for deletion. Adjust anything, then clear them all in one click.">Duplicates</H>
      {clusters.length === 0 && <Panel><p style={{ margin: 0, color: T.faint, fontSize: 13 }}>No potential duplicates found. Timeline's clean.</p></Panel>}
      {clusters.length > 0 && (
        <Panel style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <span style={{ fontSize: 13 }}>{clusters.length} group{clusters.length === 1 ? "" : "s"} found · <strong>{checked.length}</strong> checked for deletion</span>
          <Btn primary disabled={checked.length === 0} onClick={() => {
            if (window.confirm("Delete " + checked.length + " incident" + (checked.length === 1 ? "" : "s") + " from the timeline? This can't be undone (outside of backups).")) onDeleteMany(checked);
          }}>Delete {checked.length} checked</Btn>
        </Panel>
      )}
      {clusters.map((g, gi) => (
        <Panel key={gi} style={{ borderLeft: "3px solid " + T.gold }}>
          <div style={{ fontSize: 11, letterSpacing: ".06em", textTransform: "uppercase", color: T.faint, marginBottom: 6 }}>Group {gi + 1} — {g.length} similar entries</div>
          {g.map((inc, idx) => (
            <div key={inc.id} style={{ display: "flex", gap: 10, alignItems: "flex-start", borderTop: idx ? "1px solid " + T.line : "none", padding: "10px 0" }}>
              <input type="checkbox" style={{ width: "auto", marginTop: 3 }} checked={!!sel[inc.id]} onChange={(e) => setSel({ ...sel, [inc.id]: e.target.checked })} />
              <div style={{ flex: 1, opacity: sel[inc.id] ? 0.55 : 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap" }}>
                  <strong style={{ fontSize: 13.5 }}>{inc.title}</strong>
                  <span style={{ fontFamily: T.mono, fontSize: 11.5, color: T.faint }}>{fmtDate(inc.occurred_on)}{idx === 0 ? " · kept by default" : ""}</span>
                </div>
                <p style={{ fontSize: 12.5, lineHeight: 1.5, margin: "4px 0 0" }}>{inc.description}</p>
              </div>
            </div>
          ))}
        </Panel>
      ))}
    </div>
  );
}

/* ---------- Evidence vault ---------- */
function EvidenceVault({ evidence, incidents, onAdd, onDelete, onDeleteMany, onPatch, apiKey, notify }) {
  const [meta, setMeta] = useState({ source: "slack_screenshot", evidence_date: "", label: "", notes: "" });
  const [fileBusy, setFileBusy] = useState("");
  const [viewing, setViewing] = useState(null);
  const [selIds, setSelIds] = useState({});
  const selCount = Object.values(selIds).filter(Boolean).length;
  const onFiles = async (files) => {
    for (let n = 0; n < files.length; n++) {
      const f = files[n];
      try {
        if (isImage(f)) {
          setFileBusy("Filing " + f.name + " (" + (n + 1) + " of " + files.length + ")…");
          const raw = await readAsDataURL(f);
          const small = await downscaleImage(raw);
          const row = onAdd({ ...meta, label: meta.label || f.name, file_name: f.name, image_data: small, transcription: "" });
          if (row.transcription || !apiKey) continue; // dupe with transcript, or no key — done
          setFileBusy("Transcribing " + f.name + " (" + (n + 1) + " of " + files.length + ")…");
          try {
            const t = await askClaudeVision(TRANSCRIBE_PROMPT, small, apiKey);
            onPatch(row.id, { transcription: t });
          } catch (e) { /* filed without transcription; re-drop later to retry */ }
        } else if (isTextFile(f)) {
          setFileBusy("Filing " + f.name + "…");
          const t = await readAsText(f);
          onAdd({ ...meta, label: meta.label || f.name, file_name: f.name, transcription: t });
        } else {
          onAdd({ ...meta, label: meta.label || f.name, file_name: f.name });
        }
      } catch (e) { notify && notify("Couldn't file " + f.name); }
    }
    setFileBusy("");
    setMeta({ source: "slack_screenshot", evidence_date: "", label: "", notes: "" });
  };
  return (
    <div>
      <H sub="Drop files straight in — each one gets an exhibit ID, screenshots are stored with a preview, and their text gets transcribed automatically so it's searchable and quotable.">Evidence vault</H>
      <Panel>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <div><label>Type</label>
            <select value={meta.source} onChange={(e) => setMeta({ ...meta, source: e.target.value })}>
              <option value="transcript">Call transcript</option><option value="slack_screenshot">Slack screenshot</option>
              <option value="text_screenshot">Text screenshot</option><option value="email">Email</option><option value="other">Other</option>
            </select></div>
          <div><label>Date of the evidence</label><input type="date" value={meta.evidence_date} onChange={(e) => setMeta({ ...meta, evidence_date: e.target.value })} /></div>
        </div>
        <label>Label (optional — filename used if blank)</label><input placeholder="Slack DM re: offsite attendance" value={meta.label} onChange={(e) => setMeta({ ...meta, label: e.target.value })} />
        <label>Notes / where it came from</label><input value={meta.notes} onChange={(e) => setMeta({ ...meta, notes: e.target.value })} />
        <div style={{ marginTop: 14 }}>
          <DropZone onFiles={onFiles} busy={!!fileBusy} busyMsg={fileBusy} hint="Drop evidence files here — each gets the next exhibit ID" accept=".txt,.md,.csv,.pdf,image/*" />
          {!apiKey && <p style={{ fontSize: 12, color: T.gold, margin: "4px 0 0" }}>No API key yet — screenshots will be stored without automatic transcription. Add your key in Settings to get transcripts.</p>}
        </div>
      </Panel>
      {viewing && (
        <div onClick={() => setViewing(null)} style={{ position: "fixed", inset: 0, background: "rgba(20,20,20,.75)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 30, cursor: "zoom-out" }}>

  { h: "Hostile work environment — the standard", b: "Under FEHA, harassment is unlawful when it's based on a protected characteristic and is severe or pervasive enough to alter working conditions. 'Pervasive' matters for pattern cases: repeated conduct that individually seems small can qualify in aggregate. California (Gov. Code §12923) explicitly states a single incident can be enough if sufficiently severe, and that the working environment is evaluated from the perspective of a reasonable person with the same characteristics." },
  { h: "Protected classes & discrimination", b: "FEHA protected characteristics include race, religion, national origin, disability, medical condition, marital status, sex, gender identity, sexual orientation, and age (40+). Targeting someone because they're gay — including engineering their termination — is sexual-orientation discrimination. Conduct that isn't tied to a protected class can still violate company policy and support a complaint about abusive conduct, but the legal claims are strongest where protected characteristics are involved." },

/* ---------- AI analysis ---------- */
function Analysis({ incidents, witnesses, evidence, analysis, setAnalysis, apiKey, goSettings }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const run = async () => {
    setBusy(true); setErr("");
    const payload = incidents.map(i => ({
      id: i.id, date: i.occurred_on, title: i.title, description: i.description, category: i.category,
      witnesses: witnesses.filter(w => (w.incidentIds || []).includes(i.id)).map(w => w.name),
      exhibits: (i.evidenceIds || []).map(id => evidence.find(e => e.id === id)?.exhibit_id).filter(Boolean),
    }));
    try {
      const out = await askClaude(
        'You are an analyst helping a California-based remote employee (employer HQ: Boston, MA) organize a workplace harassment complaint for HR review and eventual attorney review. Analyze these documented incidents. Respond ONLY with JSON, no markdown: {"pattern_summary":"2-3 sentence neutral summary of the overall pattern","incident_analysis":[{"id":"...","legal_categories":["e.g., FEHA hostile work environment factor","retaliation","sexual-orientation discrimination"],"pattern_strength":"strong|moderate|weak","strengthen":"one specific suggestion for corroboration or detail"}],"deadline_flags":["any timing concerns given EEOC 300-day and CRD 3-year windows, computed from the incident dates and today\'s date ' + new Date().toISOString().slice(0, 10) + '"],"gaps":["up to 5 most important overall gaps"]}. This is informational analysis, not legal advice. INCIDENTS: ' + JSON.stringify(payload), apiKey, 5000);
      const j = parseJSON(out);
      if (!j) throw new Error("parse");
      setAnalysis(j);
    } catch (e) {
      setErr(e.message === "no-key" ? "needs-key" : "Analysis didn't come back clean — try again.");
    }
    setBusy(false);
  };
  return (
    <div>
      <H sub="Maps incidents to the legal categories they may support, rates pattern strength, and flags deadline risk. Informational only — your lawyer makes the calls.">AI analysis</H>
      <Panel>
        <Btn primary disabled={busy || incidents.length === 0} onClick={run}>{busy ? "Analyzing…" : "Analyze " + incidents.length + " incident" + (incidents.length === 1 ? "" : "s")}</Btn>
        {incidents.length === 0 && <span style={{ fontSize: 13, color: T.faint, marginLeft: 12 }}>Log incidents first.</span>}
        {err === "needs-key" && <p style={{ fontSize: 13, color: T.gold }}>This feature needs your Anthropic API key. <button onClick={goSettings} style={{ border: "none", background: "none", textDecoration: "underline", fontSize: 13, padding: 0 }}>Add it in Settings</button>.</p>}
        {err && err !== "needs-key" && <p style={{ color: T.accent, fontSize: 13 }}>{err}</p>}
      </Panel>
      {analysis && (<React.Fragment>
        <Panel><h2 style={{ fontFamily: T.serif, fontSize: 16, margin: "0 0 6px", fontWeight: 500 }}>Pattern summary</h2>
          <p style={{ fontSize: 13.5, lineHeight: 1.6, margin: 0 }}>{analysis.pattern_summary}</p></Panel>
        {(analysis.deadline_flags || []).length > 0 && <Panel style={{ borderLeft: "3px solid " + T.gold }}>
          <h2 style={{ fontFamily: T.serif, fontSize: 15, margin: "0 0 6px", fontWeight: 500 }}>Deadline flags</h2>
          {analysis.deadline_flags.map((d, i) => <p key={i} style={{ fontSize: 13, margin: "4px 0", lineHeight: 1.5 }}>{d}</p>)}</Panel>}
        {(analysis.incident_analysis || []).map((a) => {
          const inc = incidents.find(i => i.id === a.id);
          return (<Panel key={a.id} style={{ padding: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap" }}>
              <strong style={{ fontSize: 13.5 }}>{inc?.title || a.id}</strong>
              <span style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: ".05em", color: a.pattern_strength === "strong" ? T.green : a.pattern_strength === "moderate" ? T.gold : T.accent }}>{a.pattern_strength} for pattern</span>
            </div>
            <p style={{ fontSize: 12.5, margin: "6px 0 2px", color: T.faint }}>{(a.legal_categories || []).join(" · ")}</p>
            <p style={{ fontSize: 13, margin: "6px 0 0", lineHeight: 1.5 }}><span style={{ color: T.faint }}>To strengthen:</span> {a.strengthen}</p>
          </Panel>);
        })}
        {(analysis.gaps || []).length > 0 && <Panel><h2 style={{ fontFamily: T.serif, fontSize: 15, margin: "0 0 8px", fontWeight: 500 }}>Biggest gaps</h2>
          {analysis.gaps.map((g, i) => <p key={i} style={{ fontSize: 13, margin: "4px 0", lineHeight: 1.5 }}>— {g}</p>)}</Panel>}
      </React.Fragment>)}
    </div>
  );
}

/* ---------- Auditor ---------- */
function runAudit(incidents, evidence, witnesses) {
  const issues = [];
  incidents.forEach((i) => {
    const wits = witnesses.filter(w => (w.incidentIds || []).includes(i.id));
    if (i.is_draft) issues.push({ id: i.id, t: i.title, msg: "Waiting for date confirmation — use the yellow box on the timeline." });
    if (!i.occurred_on) issues.push({ id: i.id, t: i.title, msg: "Missing date." });
    if ((i.description || "").length < 80) issues.push({ id: i.id, t: i.title, msg: "Description is thin — add who/what/order of events." });
    if (!i.quotes) issues.push({ id: i.id, t: i.title, msg: "No exact quotes. If any exist, add them verbatim." });
    if ((i.evidenceIds || []).length === 0) issues.push({ id: i.id, t: i.title, msg: "No evidence attached." });
    if (wits.length === 0 && (i.people_present || []).length > 0) issues.push({ id: i.id, t: i.title, msg: "People were present but no witness is linked." });
    const emo = EMOTIONAL_WORDS.filter(w => ((i.description || "") + " " + (i.title || "")).toLowerCase().includes(w));
    if (emo.length) issues.push({ id: i.id, t: i.title, msg: 'Neutralize language: "' + emo.join('", "') + '".' });
  });
  const unlinked = evidence.filter(e => !incidents.some(i => (i.evidenceIds || []).includes(e.id)));
  unlinked.forEach(e => issues.push({ id: e.id, t: e.exhibit_id, msg: "Exhibit not linked to any incident." }));
  const maxScore = Math.max(incidents.length * 6 + evidence.length, 1);
  const score = Math.max(0, Math.round(100 * (1 - issues.length / maxScore)));
  return { issues, score };
}
function Auditor({ audit, incidents, goFix }) {
  return (
    <div>
      <H sub="Every t crossed, every i dotted. This scans the whole case for gaps an investigator or lawyer would spot in the first five minutes.">Completeness auditor</H>
      <Panel style={{ display: "flex", alignItems: "center", gap: 20 }}>
        <div style={{ fontFamily: T.serif, fontSize: 44, lineHeight: 1, color: audit.score > 80 ? T.green : audit.score > 50 ? T.gold : T.accent }}>{incidents.length ? audit.score : "—"}</div>
        <div style={{ fontSize: 13, color: T.faint, lineHeight: 1.5 }}>Case-readiness score.<br />{incidents.length === 0 ? "Log incidents to begin." : audit.issues.length === 0 ? "Clean. Ready for lawyer review." : audit.issues.length + " item" + (audit.issues.length === 1 ? "" : "s") + " to resolve below."}</div>
      </Panel>
      {audit.issues.map((iss, n) => (
        <Panel key={n} style={{ padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
          <div style={{ fontSize: 13 }}><strong style={{ fontWeight: 600 }}>{iss.t}</strong> — {iss.msg}</div>
          <Btn small onClick={goFix}>Go to timeline</Btn>
        </Panel>
      ))}
    </div>
  );
}

        {rows.map((i, n) => (
          <div key={i.id} style={{ margin: "0 0 18px", pageBreakInside: "avoid" }}>
            <div style={{ fontSize: 13.5 }}><strong>{n + 1}. {fmtDate(i.occurred_on)}{i.occurred_time ? ", " + i.occurred_time : ""}</strong> — {i.title} <span style={{ fontFamily: T.sans, fontSize: 10.5, color: T.faint }}>[{(CATEGORIES[i.category] || CATEGORIES.other).label}{i.medium ? " · " + i.medium.replace("_", " ") : ""}]</span></div>
            <p style={{ fontSize: 13, lineHeight: 1.65, margin: "5px 0" }}>{i.description}</p>
            {i.quotes && <p style={{ fontSize: 13, fontStyle: "italic", margin: "4px 0" }}>Quoted: "{i.quotes}"</p>}
            {i.impact && <p style={{ fontSize: 12.5, margin: "4px 0", color: "#444" }}>Impact: {i.impact}</p>}
            <p style={{ fontSize: 12, fontFamily: T.sans, color: T.faint, margin: "3px 0 0" }}>
              {(i.people_present || []).length > 0 && <span>Present: {(i.people_present || []).join(", ")}. </span>}
              {(i.evidenceIds || []).length > 0 && <span>Exhibits: {(i.evidenceIds || []).map(id => evidence.find(e => e.id === id)?.exhibit_id).filter(Boolean).join(", ")}. </span>}
              {witnesses.filter(w => (w.incidentIds || []).includes(i.id)).length > 0 && <span>Corroborated by: {witnesses.filter(w => (w.incidentIds || []).includes(i.id)).map(w => w.name).join(", ")}.</span>}
            </p>
          </div>
        ))}
        {retal.length > 0 && (<React.Fragment><h2 style={{ fontSize: 17, fontWeight: 500, marginTop: 26 }}>Retaliation record</h2>
          {retal.map((r) => <p key={r.id} style={{ fontSize: 13, lineHeight: 1.6 }}><strong>{fmtDate(r.occurred_on)}</strong> — {r.description}{r.evidence_note ? " (Evidence: " + r.evidence_note + ")" : ""}</p>)}</React.Fragment>)}
        {evidence.length > 0 && (<React.Fragment><h2 style={{ fontSize: 17, fontWeight: 500, marginTop: 26 }}>Exhibit index</h2>
        <table style={{ width: "100%", fontSize: 12.5, borderCollapse: "collapse" }}>
          <tbody>{evidence.map(e => (<tr key={e.id} style={{ borderTop: "1px solid #ddd" }}>
            <td style={{ fontFamily: T.mono, padding: "5px 8px 5px 0", width: 60 }}>{e.exhibit_id}</td>
            <td style={{ padding: "5px 8px" }}>{e.label || e.file_name}</td>
            <td style={{ padding: "5px 0", width: 110, color: "#666" }}>{fmtDate(e.evidence_date)}</td></tr>))}</tbody>
        </table></React.Fragment>)}
        {witnesses.length > 0 && (<React.Fragment><h2 style={{ fontSize: 17, fontWeight: 500, marginTop: 26 }}>Witness list</h2>
        {witnesses.map(w => <p key={w.id} style={{ fontSize: 13, lineHeight: 1.6, margin: "4px 0" }}><strong>{w.name}</strong> ({w.employment} employee; {WITNESS_STATUS[w.status].toLowerCase()}){w.experienced ? " — " + w.experienced : ""}</p>)}</React.Fragment>)}
        {inclImages && imgExhibits.length > 0 && (<React.Fragment>
          <h2 style={{ fontSize: 17, fontWeight: 500, marginTop: 26, pageBreakBefore: "always" }}>Appendix — exhibit images</h2>
          {imgExhibits.map(e => (
            <div key={e.id} style={{ margin: "0 0 22px", pageBreakInside: "avoid" }}>
              <div style={{ fontFamily: T.mono, fontSize: 12, marginBottom: 6 }}>{e.exhibit_id} — {e.label || e.file_name}{e.evidence_date ? " · " + fmtDate(e.evidence_date) : ""}</div>
              <img src={e.image_data} style={{ maxWidth: "100%", border: "1px solid #ddd" }} />
            </div>
          ))}
        </React.Fragment>)}
        <p style={{ fontSize: 11, color: T.faint, marginTop: 34, fontFamily: T.sans }}>Prepared from contemporaneous records maintained by the complainant. AI-assisted organization; all facts as documented by the complainant. Informational compilation — not legal advice.</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PasswordGate><CaseHub /></PasswordGate>);
</script>
</body>
</html>
